services:
  wellness-bot:
    build: .
    container_name: wellness-bot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '${PORT:-8080}:8080'
    volumes:
      - ./data:/data
      - ./logs:/logs
      - ./cache:/cache
      - ./backups:/backups
      # Reuse the host's authenticated Claude Code OAuth session.
      - ${CLAUDE_CONFIG_DIR:-~/.claude}:/root/.claude
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
